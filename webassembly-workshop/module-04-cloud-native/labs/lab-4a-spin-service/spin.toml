spin_manifest_version = 2

[application]
name = "lab-4a-spin-service"
version = "0.1.0"
description = "WASM HTTP microservice demo – Cloud-Native Workshop"

[[trigger.http]]
route = "/..."
component = "lab-4a-spin-service"

[component.lab-4a-spin-service]
source = "target/wasm32-wasip1/release/lab_4a_spin_service.wasm"
allowed_outbound_hosts = []

[component.lab-4a-spin-service.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
